<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Oficial | J&J CAPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0A0A0A; --gold: #D4AF37; --white: #FFF; --font-h: 'Cinzel', serif; --font-b: 'Raleway', sans-serif; --transition: all 0.3s ease; }
        body { background: var(--bg); color: var(--white); font-family: var(--font-b); margin: 0; padding-top: 110px; }
        
        /* HEADER */
        header { background: rgba(10,10,10,0.98); position: fixed; width: 100%; top: 0; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212,175,55,0.1); z-index: 1000; box-sizing: border-box; }
        .logo { font-family: var(--font-h); color: var(--gold); font-size: 1.6rem; letter-spacing: 4px; font-weight: 900; }
        .back-link { color: var(--gold); text-decoration: none; padding: 8px 20px; border: 1px solid var(--gold); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; transition: var(--transition); }
        .back-link:hover { background: var(--gold); color: #000; }

        /* ADMIN PANEL */
        .admin-section { text-align: center; margin: 20px 0; }
        #admin-panel { background: #111; margin: 0 8% 30px; padding: 25px; border: 1px solid #222; display: none; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input, select { background: #000; color: #fff; border: 1px solid #333; padding: 12px; font-family: var(--font-b); outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-gold { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 12px; cursor: pointer; text-transform: uppercase; font-family: var(--font-h); font-size: 0.7rem; transition: var(--transition); }
        .btn-gold:hover { background: var(--gold); color: #000; }

        /* FILTROS */
        .filters { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { background: transparent; color: #666; border: none; font-family: var(--font-h); cursor: pointer; border-bottom: 2px solid transparent; padding-bottom: 5px; transition: var(--transition); letter-spacing: 1px; }
        .filter-btn.active, .filter-btn:hover { color: var(--gold); border-bottom-color: var(--gold); }

        /* GRID DE PRODUCTOS */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; padding: 0 8% 100px; }
        .product-card { position: relative; text-align: center; background: transparent; transition: var(--transition); }
        
       /* --- CARRUSEL DE IMÁGENES --- */
        .carousel-container { 
            position: relative; 
            width: 100%; 
            height: 380px; 
            margin-bottom: 15px; 
            overflow: hidden; /* Esto asegura que el zoom no se salga del cuadro */
            border: 1px solid #1a1a1a; 
        }
        
        .carousel { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scrollbar-width: none; 
            width: 100%; 
            height: 100%; 
            scroll-behavior: smooth; 
        }
        
        .carousel::-webkit-scrollbar { display: none; }
        
        /* ESTADO NORMAL DE LA IMAGEN */
        .carousel img { 
            flex: 0 0 100%; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            scroll-snap-align: center; 
            filter: grayscale(15%); 
            /* Añadimos una transición específica y más lenta para el zoom */
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.5s ease; 
        }

        /* EFECTO HOVER: ZOOM SUTIL + A TODO COLOR */
        .product-card:hover .carousel img { 
            filter: grayscale(0%); 
            transform: scale(1.08); /* Este es el zoom sutil (8% más grande) */
        }
        /* BOTONES DEL CARRUSEL */
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; z-index: 2; opacity: 0; transition: var(--transition); border-radius: 50%; }
        .product-card:hover .slider-btn { opacity: 1; }
        .slider-btn:hover { background: var(--gold); color: #000; }
        .slider-btn.prev { left: 10px; }
        .slider-btn.next { right: 10px; }

        /* TEXTOS DEL PRODUCTO */
        .product-card h3 { font-family: var(--font-h); font-size: 1.1rem; margin: 10px 0 5px; letter-spacing: 1px; }
        .price { color: var(--gold); font-weight: 700; letter-spacing: 1px; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #ff4444; border: 1px solid #ff4444; border-radius: 50%; cursor: pointer; width: 30px; height: 30px; z-index: 10; opacity: 0; transition: var(--transition); }
        .product-card:hover .btn-del { opacity: 1; }
        .btn-del:hover { background: #ff4444; color: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo">J&J CAPS</div>
        <a href="index.html" class="back-link">Inicio</a>
    </header>

    <div class="admin-section">
        <button class="btn-gold" onclick="toggleAdmin()">Gestionar Inventario</button>
    </div>

    <div id="admin-panel" style="display: none;">
        <input type="text" id="p-name" placeholder="Nombre Producto">
        <input type="text" id="p-price" placeholder="Precio (ej: $120.00)">
        <select id="p-category">
            <option value="relojes">Relojes</option>
            <option value="gorras">Gorras</option>
            <option value="lociones">Lociones</option>
        </select>
        <input type="text" id="p-img" placeholder="Imágenes (ej: foto1.jpg, foto2.jpg)">
        <button class="btn-gold" onclick="addProduct()">Guardar en la Nube</button>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterProducts('todos', this)">Todos</button>
        <button class="filter-btn" onclick="filterProducts('relojes', this)">Relojes</button>
        <button class="filter-btn" onclick="filterProducts('gorras', this)">Gorras</button>
        <button class="filter-btn" onclick="filterProducts('lociones', this)">Lociones</button>
    </div>

    <div class="catalog-grid" id="catalog-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        // IMPORTANTE: Pega aquí abajo tu configuración de Firebase exacta:
        const firebaseConfig = {
            apiKey: "AIzaSyBCiTzqR3qkJ_q4uJ7vI_7oY82RvNB77Hk",
            authDomain: "jjcaps.firebaseapp.com",
            projectId: "jjcaps",
            storageBucket: "jjcaps.firebasestorage.app",
            messagingSenderId: "1060570973258",
            appId: "1:1060570973258:web:0acf507fd6847f579852b3",
            measurementId: "G-B8DKYTJ3TV"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);
        const productsCol = collection(db, 'productos');

        let allProducts = [];

        onSnapshot(productsCol, (snapshot) => {
            allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts('todos');
        });

        window.renderProducts = (filter) => {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            const filtered = filter === 'todos' ? allProducts : allProducts.filter(p => p.category === filter);
            
            filtered.forEach(p => {
                // Compatibilidad: Si el producto antiguo solo tiene un 'img' texto, lo convierte en array.
                // Si es nuevo, ya vendrá como array en 'p.images'.
                const imageArray = p.images || (p.img ? [p.img] : ['https://via.placeholder.com/400x500?text=Sin+Imagen']);
                
                // Generar las etiquetas <img> dinámicamente
                let imagesHTML = '';
                imageArray.forEach(src => {
                    imagesHTML += `<img src="${src}" alt="${p.name}">`;
                });

                // Si hay más de 1 imagen, mostrar las flechas
                let arrowsHTML = '';
                if(imageArray.length > 1) {
                    arrowsHTML = `
                        <button class="slider-btn prev" onclick="slideImage('${p.id}', -1)">❮</button>
                        <button class="slider-btn next" onclick="slideImage('${p.id}', 1)">❯</button>
                    `;
                }

                grid.innerHTML += `
                    <div class="product-card">
                        <button class="btn-del" onclick="deleteProduct('${p.id}')" title="Eliminar Producto">×</button>
                        <div class="carousel-container">
                            <div class="carousel" id="carousel-${p.id}">
                                ${imagesHTML}
                            </div>
                            ${arrowsHTML}
                        </div>
                        <h3>${p.name}</h3>
                        <p class="price">${p.price}</p>
                    </div>`;
            });
        };

        // Función para mover el carrusel de imágenes
        window.slideImage = (id, direction) => {
            const container = document.getElementById(`carousel-${id}`);
            const scrollAmount = container.offsetWidth; // Mueve exactamente el ancho de una foto
            container.scrollBy({ left: scrollAmount * direction, behavior: 'smooth' });
        };

        window.addProduct = async () => {
            const pass = prompt("Clave de Administrador:");
            if(pass !== "JJ2026") return alert("Clave incorrecta");
            
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const category = document.getElementById('p-category').value;
            const imgInput = document.getElementById('p-img').value;

            if(name && price && imgInput) {
                // Separar el texto por comas, quitar espacios extra y guardar como Array
                const imagesArray = imgInput.split(',').map(item => item.trim()).filter(item => item !== '');

                // Guardamos en Firebase el nuevo campo 'images' (que es una lista)
                await addDoc(productsCol, { name, price, category, images: imagesArray });
                
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-img').value = '';
                toggleAdmin();
            } else { alert("Rellena todos los campos"); }
        };

        window.deleteProduct = async (id) => {
            if(prompt("Clave para eliminar:") === "JJ2026") {
                await deleteDoc(doc(db, "productos", id));
            }
        };

        window.toggleAdmin = () => {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'none' ? 'grid' : 'none';
        };

        window.filterProducts = (cat, btn) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo J&J CAPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #0A0A0A;
            --gold: #D4AF37;
            --white: #FFFFFF;
            --font-heading: 'Cinzel', serif;
            --font-body: 'Raleway', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--white);
            font-family: var(--font-body);
            margin: 0;
            padding-top: 120px;
        }

        /* --- NAVBAR --- */
        header {
            background-color: rgba(10, 10, 10, 0.98);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 20px 8%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(10px);
            box-sizing: border-box; /* Muy importante para el espaciado */
        }

        .logo {
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 1.6rem;
            color: var(--gold);
            letter-spacing: 4px;
        }

        .back-link {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 600;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid var(--gold);
            border-radius: 2px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .back-link:hover {
            background-color: var(--gold);
            color: var(--bg-black);
        }

        /* --- RESTO DEL DISEÑO --- */
        .admin-toggle { text-align: center; margin-bottom: 30px; }
        #admin-panel { background: #111; margin: 0 8% 40px; padding: 25px; border: 1px solid #222; display: none; }
        .btn-action { padding: 10px 20px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-family: var(--font-heading); text-transform: uppercase; }
        .btn-action:hover { background: var(--gold); color: black; }
        .filters { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .filter-btn { background: transparent; color: #666; border: none; font-family: var(--font-heading); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .filter-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; padding: 0 8% 100px; }
        .product-card { position: relative; text-align: center; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; border: 1px solid #1a1a1a; margin-bottom: 15px; }
        .product-card h3 { font-family: var(--font-heading); font-size: 1.1rem; margin-bottom: 5px; }
        .product-card .price { color: var(--gold); font-weight: 600; }
        .btn-delete { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: red; border: 1px solid red; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">J&J CAPS</div>
        <a href="index.html" class="back-link">Inicio</a>
    </header>

    <div class="admin-toggle">
        <button class="btn-action" style="font-size: 0.6rem;" onclick="toggleAdmin()">Gestionar Inventario</button>
    </div>

    <div id="admin-panel">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
            <input type="text" id="p-name" placeholder="Nombre" style="padding: 10px; background: #000; color: #fff; border: 1px solid #333;">
            <input type="text" id="p-price" placeholder="Precio" style="padding: 10px; background: #000; color: #fff; border: 1px solid #333;">
            <select id="p-category" style="padding: 10px; background: #000; color: #fff; border: 1px solid #333;">
                <option value="relojes">Relojes</option>
                <option value="gorras">Gorras</option>
                <option value="lociones">Lociones</option>
            </select>
            <input type="text" id="p-img" placeholder="URL Imagen" style="padding: 10px; background: #000; color: #fff; border: 1px solid #333;">
            <button class="btn-action" onclick="addProduct()">Añadir</button>
        </div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterProducts('todos', this)">Todos</button>
        <button class="filter-btn" onclick="filterProducts('relojes', this)">Relojes</button>
        <button class="filter-btn" onclick="filterProducts('gorras', this)">Gorras</button>
        <button class="filter-btn" onclick="filterProducts('lociones', this)">Lociones</button>
    </div>

    <div class="catalog-grid" id="catalog-grid"></div>

    <script>
        let products = JSON.parse(localStorage.getItem('jjcaps_inventory')) || [
            { id: 1, name: "Onyx Gold Edition", price: "$180.00", category: "relojes", img: "https://images.unsplash.com/photo-1523170335258-f5ed11844a49?q=80" },
            { id: 2, name: "Midnight Snapback", price: "$45.00", category: "gorras", img: "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?q=80" }
        ];

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function renderProducts(filter = 'todos') {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            const filtered = filter === 'todos' ? products : products.filter(p => p.category === filter);
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <button class="btn-delete" onclick="removeProduct(${p.id})">×</button>
                        <img src="${p.img}">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price}</p>
                    </div>
                `;
            });
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const category = document.getElementById('p-category').value;
            const img = document.getElementById('p-img').value || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80';
            if(name && price) {
                products.push({ id: Date.now(), name, price, category, img });
                localStorage.setItem('jjcaps_inventory', JSON.stringify(products));
                renderProducts();
                toggleAdmin();
            }
        }

        function removeProduct(id) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('jjcaps_inventory', JSON.stringify(products));
            renderProducts();
        }

        function filterProducts(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        renderProducts();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Oficial | J&J CAPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0A0A0A; --gold: #D4AF37; --white: #FFF; --font-h: 'Cinzel', serif; --font-b: 'Raleway', sans-serif; }
        body { background: var(--bg); color: var(--white); font-family: var(--font-b); margin: 0; padding-top: 110px; }
        
        /* HEADER */
        header { background: rgba(10,10,10,0.98); position: fixed; width: 100%; top: 0; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212,175,55,0.1); z-index: 1000; box-sizing: border-box; }
        .logo { font-family: var(--font-h); color: var(--gold); font-size: 1.6rem; letter-spacing: 4px; font-weight: 900; }
        .back-link { color: var(--gold); text-decoration: none; padding: 8px 20px; border: 1px solid var(--gold); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .back-link:hover { background: var(--gold); color: #000; }

        /* ADMIN PANEL */
        .admin-section { text-align: center; margin: 20px 0; }
        #admin-panel { background: #111; margin: 0 8% 30px; padding: 25px; border: 1px solid #222; display: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        input, select { background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-family: var(--font-b); }
        .btn-gold { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 10px; cursor: pointer; text-transform: uppercase; font-family: var(--font-h); font-size: 0.7rem; }
        .btn-gold:hover { background: var(--gold); color: #000; }

        /* GRID */
        .filters { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .filter-btn { background: transparent; color: #666; border: none; font-family: var(--font-h); cursor: pointer; border-bottom: 2px solid transparent; }
        .filter-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; padding: 0 8% 100px; }
        .product-card { position: relative; text-align: center; border: 1px solid #111; padding-bottom: 15px; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 15px; }
        .product-card h3 { font-family: var(--font-h); font-size: 1rem; margin: 10px 0; }
        .price { color: var(--gold); font-weight: 700; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: red; border: 1px solid red; border-radius: 50%; cursor: pointer; width: 30px; height: 30px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">J&J CAPS</div>
        <a href="index.html" class="back-link">Inicio</a>
    </header>

    <div class="admin-section">
        <button class="btn-gold" onclick="toggleAdmin()">Gestionar Inventario</button>
    </div>

    <div id="admin-panel" style="display: none;">
        <input type="text" id="p-name" placeholder="Nombre Producto">
        <input type="text" id="p-price" placeholder="Precio (ej: $120.00)">
        <select id="p-category">
            <option value="relojes">Relojes</option>
            <option value="gorras">Gorras</option>
            <option value="lociones">Lociones</option>
        </select>
        <input type="text" id="p-img" placeholder="URL de Imagen">
        <button class="btn-gold" onclick="addProduct()">Guardar en la Nube</button>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterProducts('todos', this)">Todos</button>
        <button class="filter-btn" onclick="filterProducts('relojes', this)">Relojes</button>
        <button class="filter-btn" onclick="filterProducts('gorras', this)">Gorras</button>
        <button class="filter-btn" onclick="filterProducts('lociones', this)">Lociones</button>
    </div>

    <div class="catalog-grid" id="catalog-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        // 1. PEGA TU CONFIGURACIÓN AQUÍ ABAJO:
        const firebaseConfig = {
            apiKey: "AIzaSyBCiTzqR3qkJ_q4uJ7vI_7oY82RvNB77Hk",
            authDomain: "jjcaps.firebaseapp.com",
            projectId: "jjcaps",
            storageBucket: "jjcaps.firebasestorage.app",
            messagingSenderId: "1060570973258",
            appId: "1:1060570973258:web:0acf507fd6847f579852b3",
            measurementId: "G-B8DKYTJ3TV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app); // Esto activa Analytics en tu código
        const productsCol = collection(db, 'productos');

        let allProducts = [];

        onSnapshot(productsCol, (snapshot) => {
            allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts('todos');
        });

        window.renderProducts = (filter) => {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            const filtered = filter === 'todos' ? allProducts : allProducts.filter(p => p.category === filter);
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <button class="btn-del" onclick="deleteProduct('${p.id}')">×</button>
                        <img src="${p.img}">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price}</p>
                    </div>`;
            });
        };

        window.addProduct = async () => {
            const pass = prompt("Clave de Administrador:");
            if(pass !== "JJ2026") return alert("Clave incorrecta");
            
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const category = document.getElementById('p-category').value;
            const img = document.getElementById('p-img').value;

            if(name && price && img) {
                await addDoc(productsCol, { name, price, category, img });
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                toggleAdmin();
            } else { alert("Rellena todos los campos"); }
        };

        window.deleteProduct = async (id) => {
            if(prompt("Clave para eliminar:") === "JJ2026") {
                await deleteDoc(doc(db, "productos", id));
            }
        };

        window.toggleAdmin = () => {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'none' ? 'grid' : 'none';
        };

        window.filterProducts = (cat, btn) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        };
    </script>
</body>
</html>
